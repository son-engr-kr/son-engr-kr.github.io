name: Sync profile README

on:
  push:
    branches: [main]
    paths:
      - 'lib/profile.ts'
      - 'lib/projects.ts'
      - 'scripts/generate-readme.ts'
      - '.github/workflows/sync-profile-readme.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4
        with:
          path: portfolio

      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: son-engr-kr/son-engr-kr
          path: profile
          token: ${{ secrets.PROFILE_README_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: portfolio/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: portfolio
        run: pnpm install --frozen-lockfile

      - name: Regenerate README
        working-directory: portfolio
        run: pnpm tsx scripts/generate-readme.ts ../profile/README.md

      - name: Commit & push if changed
        working-directory: profile
        run: |
          if git diff --quiet README.md; then
            echo "README.md unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Sync README from portfolio"
          git push
